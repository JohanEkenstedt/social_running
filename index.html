<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Tavelsjö Social Löpning</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    #map { height: 100vh; width: 100vw; margin: 0; }
    .legend {
      background: white;
      padding: 10px;
      font-size: 14px;
      line-height: 1.5;
      border-radius: 5px;
      box-shadow: 0 0 5px rgba(0,0,0,0.3);
    }
    .legend div {
      margin-bottom: 5px;
      display: flex;
      align-items: center;
    }
    .legend-color-box {
      width: 20px;
      height: 10px;
      margin-right: 8px;
      border: 1px solid #ccc;
    }
    .leaflet-control-layers {
      margin: 20px !important;
    }
    .leaflet-bar a {
      margin: 20px !important;
      text-align: center;
      font-size: 20px;
    }
  </style>
</head>
<body>
  <div id="map"></div>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
    const map = L.map('map', {
      center: [64.005209, 20.004325],
      zoom: 13
    });
    // Base layers
    const osm = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      maxZoom: 19,
      attribution: '© OpenStreetMap contributors'
    });
    const googleSat = L.tileLayer('http://www.google.cn/maps/vt?lyrs=s@189&gl=cn&x={x}&y={y}&z={z}', {
      maxZoom: 19,
      attribution: '© Google Satellite'
    });
    // Set Google as default
    googleSat.addTo(map);
    const baseLayers = {
      "Google Satellite": googleSat,
      "OpenStreetMap": osm
    };
    L.control.layers(baseLayers, null, { position: 'bottomright' }).addTo(map);
    // Track styling
    const colorMap = {
      "Årets slinga": "orange"
    };
    const routeLayers = {
      "Årets slinga": L.layerGroup()
    };
    // Load GeoJSON
    fetch('TavelsjoSocial.geojson')
      .then(res => res.json())
      .then(data => {
        const allLayers = [];
        data.features.forEach(feature => {
          const namn = feature.properties.Namn?.trim();
          const layer = L.geoJSON(feature, {
            style: {
              color: colorMap[namn] || "orange",
              weight: 4,
              opacity: 1
            },
            onEachFeature: (feature, layer) => {
              const km = feature.properties.Distance_km;
              const year = feature.properties.Year;
              const label = (year ? year + ' – ' : '') + namn + (km ? ' (' + km + ' km)' : '');
              layer.bindPopup(label);
            }
          });
          if (routeLayers[namn]) {
            routeLayers[namn].addLayer(layer);
          }
          allLayers.push(layer);
        });
        routeLayers["Årets slinga"].addTo(map);
        // Fit map to the route
        if (allLayers.length) {
          const group = L.featureGroup(allLayers);
          map.fitBounds(group.getBounds(), { padding: [30, 30] });
        }
      });
    // Track toggles
    const legend = L.control({ position: "topleft" });
    legend.onAdd = function () {
      const div = L.DomUtil.create("div", "legend");
      div.innerHTML = `
        <strong>Löprunda 2026:</strong><br/>
        <div><input type="checkbox" id="chk-arets" checked><span class="legend-color-box" style="background:orange;"></span>Årets slinga (~10,5 km)</div>
      `;
      return div;
    };
    legend.addTo(map);
    function toggleLayer(id, key) {
      const checkbox = document.getElementById(id);
      checkbox.addEventListener('change', () => {
        if (checkbox.checked) {
          routeLayers[key].addTo(map);
        } else {
          map.removeLayer(routeLayers[key]);
        }
      });
    }
    toggleLayer("chk-arets", "Årets slinga");
    // 📍 GPS tracking with toggle
    let userMarker;
    let watchId = null;
    let isTracking = false;
    const locateControl = L.control({ position: 'topright' });
    locateControl.onAdd = function () {
      const div = L.DomUtil.create('div', 'leaflet-bar leaflet-control');
      div.innerHTML = '<a href="#" title="Show my location" id="locateBtn" style="display: block; padding: 5px;">📍</a>';
      return div;
    };
    locateControl.addTo(map);
    function startTracking() {
      watchId = navigator.geolocation.watchPosition(
        function (pos) {
          const latlng = [pos.coords.latitude, pos.coords.longitude];
          if (!userMarker) {
            userMarker = L.marker(latlng).addTo(map).bindPopup("You are here").openPopup();
          } else {
            userMarker.setLatLng(latlng);
          }
          map.setView(latlng, 16);
        },
        function () {
          alert("Location access denied.");
        },
        {
          enableHighAccuracy: true,
          maximumAge: 1000
        }
      );
      isTracking = true;
      document.getElementById("locateBtn").innerText = "🟢"; // active icon
    }
    function stopTracking() {
      if (watchId !== null) {
        navigator.geolocation.clearWatch(watchId);
        watchId = null;
      }
      if (userMarker) {
        map.removeLayer(userMarker);
        userMarker = null;
      }
      isTracking = false;
      document.getElementById("locateBtn").innerText = "📍"; // default icon
    }
    document.getElementById('locateBtn').onclick = function (e) {
      e.preventDefault();
      if (!isTracking) {
        startTracking();
      } else {
        stopTracking();
      }
    };
  </script>
</body>
</html>
